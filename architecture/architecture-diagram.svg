<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1100" viewBox="0 0 1400 1100">
  <defs>
    <style type="text/css"><![CDATA[
      .title { font: 700 28px Inter, Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 16px Inter, Arial, sans-serif; fill: #374151; }
      .label { font: 600 18px Inter, Arial, sans-serif; fill: #111827; }
      .text { font: 14px Inter, Arial, sans-serif; fill: #374151; }
      .mono { font: 12px "SFMono-Regular", Menlo, Consolas, monospace; fill: #374151; }
      .box { fill: #ffffff; stroke: #1f2937; stroke-width: 1.5; rx: 10; }
      .accent { fill: #f9fafb; stroke: #1f2937; stroke-width: 1.5; rx: 8; }
      .side { fill: #f3f4f6; stroke: #374151; stroke-width: 1.2; rx: 10; }
      .arrow { stroke: #4b5563; stroke-width: 2.5; marker-end: url(#arrowhead); }
      .dashed { stroke-dasharray: 6 6; }
      .badge { fill: #e5e7eb; stroke: #9ca3af; stroke-width: 1; rx: 6; }
    ]]></style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4b5563" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="1100" fill="#ffffff"/>

  <text x="700" y="50" text-anchor="middle" class="title">VPN Detection & Deanonymisation — System Architecture</text>
  <text x="700" y="78" text-anchor="middle" class="subtitle">Multi-layer risk-based VPN traffic analysis with ML-driven intent scoring</text>

  <!-- User Request -->
  <rect class="box" x="490" y="110" width="420" height="60" />
  <text class="label" x="700" y="147" text-anchor="middle">User Request</text>

  <!-- Layer 1: Edge Firewall -->
  <rect class="box" x="280" y="200" width="840" height="140"/>
  <text class="label" x="700" y="230" text-anchor="middle">LAYER 1: EDGE FIREWALL (IP & MTU Filter)</text>
  <text class="text" x="320" y="260">• IP intelligence check (IPQualityScore, IPinfo, IP2Proxy)</text>
  <text class="text" x="320" y="285">• MTU/MSS fingerprint extraction</text>
  <text class="text" x="320" y="310">• Fast pass/block decision (latency &lt; 10 ms)</text>

  <!-- Arrow 1 -->
  <line class="arrow" x1="700" y1="170" x2="700" y2="200"/>

  <!-- Layer 2: Load Balancer -->
  <rect class="box" x="280" y="370" width="840" height="120"/>
  <text class="label" x="700" y="400" text-anchor="middle">LAYER 2: LOAD BALANCER (TLS Termination)</text>
  <text class="text" x="320" y="430">• Decrypt incoming traffic (controlled)</text>
  <text class="text" x="320" y="455">• Extract metadata: SNI, RTT, JA3 fingerprint</text>

  <!-- Arrow 2 -->
  <line class="arrow" x1="700" y1="340" x2="700" y2="370"/>

  <!-- Layer 3: ML Risk Scoring Engine -->
  <rect class="box" x="220" y="520" width="960" height="220"/>
  <text class="label" x="700" y="550" text-anchor="middle">LAYER 3: ML RISK SCORING ENGINE</text>

  <!-- Stage 1 and Stage 2 -->
  <rect class="accent" x="260" y="575" width="420" height="130"/>
  <text class="label" x="470" y="605" text-anchor="middle">Stage 1: CNN — Application Classifier</text>
  <text class="text" x="290" y="635">• Input: Packet Block Image (64×64×3)</text>
  <text class="text" x="290" y="658">• Output: App_Class label (e.g., Browsing, VoIP, C2)</text>

  <rect class="accent" x="720" y="575" width="420" height="130"/>
  <text class="label" x="930" y="605" text-anchor="middle">Stage 2: XGBoost / RF — Intent Classifier</text>
  <text class="text" x="750" y="635">• Input: 25+ features + App_Class</text>
  <text class="text" x="750" y="658">• Output: Risk Score (0–99)</text>

  <!-- Arrow from Stage 1 to Stage 2 -->
  <line class="arrow" x1="680" y1="640" x2="720" y2="640"/>

  <!-- Arrow 3 -->
  <line class="arrow" x1="700" y1="490" x2="700" y2="520"/>

  <!-- Layer 4: Policy Engine -->
  <rect class="box" x="280" y="770" width="840" height="170"/>
  <text class="label" x="700" y="800" text-anchor="middle">LAYER 4: POLICY ENGINE</text>
  <text class="text" x="320" y="830">• Evaluate risk tier (YAML-configurable thresholds)</text>
  <text class="text" x="320" y="855">• Actions: ALLOW (0–20) / CHALLENGE (21–60) / BLOCK (61–99)</text>
  <text class="text" x="320" y="880">• Log decision & feedback loop for retraining</text>

  <!-- Arrow 4 -->
  <line class="arrow" x1="700" y1="740" x2="700" y2="770"/>

  <!-- Monitoring & Logging -->
  <rect class="side" x="980" y="960" width="360" height="100"/>
  <text class="label" x="1160" y="990" text-anchor="middle">MONITORING & LOGGING SYSTEM</text>
  <text class="text" x="1010" y="1015">• Prometheus + Grafana (metrics)</text>
  <text class="text" x="1010" y="1040">• ELK Stack (Elasticsearch, Logstash, Kibana)</text>

  <!-- Arrow to Monitoring -->
  <line class="arrow dashed" x1="840" y1="930" x2="980" y2="1010"/>

  <!-- Support Infrastructure Side Panel -->
  <rect class="side" x="60" y="930" width="360" height="130"/>
  <text class="label" x="240" y="960" text-anchor="middle">Support Infrastructure</text>
  <text class="text" x="90" y="985">• Model Storage: MinIO (S3-compatible)</text>
  <text class="text" x="90" y="1010">• Caching: Redis (real-time IP lookups)</text>
  <text class="text" x="90" y="1035">• Configuration: YAML policy thresholds</text>

  <!-- Data flows to support infra (dashed) -->
  <line class="arrow dashed" x1="280" y1="840" x2="420" y2="930"/>
  <line class="arrow dashed" x1="560" y1="630" x2="420" y2="930"/>

  <!-- Legend -->
  <rect class="accent" x="1020" y="120" width="300" height="130"/>
  <text class="label" x="1170" y="150" text-anchor="middle">Legend</text>
  <rect x="1040" y="170" width="18" height="12" class="box"/>
  <text class="text" x="1065" y="180">Core processing layer</text>
  <line class="arrow" x1="1048" y1="200" x2="1066" y2="200"/>
  <text class="text" x="1075" y="205">Synchronous data flow</text>
  <line class="arrow dashed" x1="1048" y1="225" x2="1066" y2="225"/>
  <text class="text" x="1075" y="230">Telemetry/auxiliary flow</text>

</svg>
