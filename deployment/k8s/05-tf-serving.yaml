---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tf-serving
  namespace: vpn-inference
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tf-serving
  template:
    metadata:
      labels:
        app: tf-serving
    spec:
      serviceAccountName: vpn-inference-sa
      containers:
      - name: tf-serving
        image: tensorflow/serving:2.13.0
        args:
          - "--port=8500"
          - "--rest_api_port=8501"
          - "--model_base_path=/models/stage1"
          - "--model_name=app_classifier"
        ports:
        - containerPort: 8500
        - containerPort: 8501
        volumeMounts:
        - name: models
          mountPath: /models
        readinessProbe:
          httpGet:
            path: /v1/models/app_classifier
            port: 8501
          initialDelaySeconds: 10
          periodSeconds: 10
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
      initContainers:
      - name: fetch-models
        image: bitnami/aws-cli:2.11.0
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: storage-credentials
              key: MINIO_ACCESS_KEY
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: storage-credentials
              key: MINIO_SECRET_KEY
        - name: AWS_REGION
          value: "us-east-1"
        command:
        - /bin/sh
        - -c
        - |
          # Configure endpoint for MinIO and copy models to /models
          aws --endpoint-url http://minio:9000 s3 cp s3://models/ /models --recursive || \
          (echo "Model fetch failed"; exit 1)
        volumeMounts:
        - name: models
          mountPath: /models
      volumes:
      - name: models
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tf-serving
  namespace: vpn-inference
spec:
  selector:
    app: tf-serving
  ports:
  - name: grpc
    port: 8500
    targetPort: 8500
  - name: rest
    port: 8501
    targetPort: 8501
  type: ClusterIP
