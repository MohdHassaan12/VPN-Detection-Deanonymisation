---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-config
  namespace: vpn-inference
data:
  APP_ENV: "production"
  LOG_LEVEL: "info"
  STAGE1_MODEL_DIR: "/models/stage1"
  STAGE2_MODEL_PATH: "/models/stage2/model.xgb"
  REDIS_HOST: "redis.vpn-inference.svc.cluster.local"
  REDIS_PORT: "6379"
---
apiVersion: v1
kind: Secret
metadata:
  name: storage-credentials
  namespace: vpn-inference
type: Opaque
stringData:
  MINIO_ACCESS_KEY: "minioaccesskey"
  MINIO_SECRET_KEY: "miniosecretkey"
