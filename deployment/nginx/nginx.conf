worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    gzip          on;
    gzip_types    text/plain text/css application/json application/javascript text/xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    upstream inference_api {
        server inference-api:8080;
    }

    server {
        listen 80;
        server_name _;

        # ── React Dashboard (static) ──────────────────────────────────────
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Inference API REST  ───────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://inference_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── WebSocket live stream  ────────────────────────────────────────
        location /ws/ {
            rewrite ^/ws/(.*) /ws/$1 break;
            proxy_pass http://inference_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        # ── Health check (pass-through) ───────────────────────────────────
        location /health {
            proxy_pass http://inference_api/health;
            proxy_set_header Host $host;
        }

        # ── Prometheus metrics (internal only) ───────────────────────────
        location /metrics {
            proxy_pass http://inference_api/metrics;
            allow 127.0.0.1;
            deny all;
        }
    }
}
