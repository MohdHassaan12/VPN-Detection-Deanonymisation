services:

  # ── Redis cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Inference API (FastAPI) ────────────────────────────────────────────────
  inference-api:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.inference-api
    restart: unless-stopped
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STAGE1_MODEL_DIR=models/stage1
      - STAGE2_MODEL_PATH=models/stage2/model.xgb
      - SECRET_KEY=${SECRET_KEY:-changeme_set_in_dotenv}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/health" ]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── React Dashboard (Nginx) ────────────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.dashboard
      args:
        - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost}
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      inference-api:
        condition: service_healthy

volumes:
  redis_data:
